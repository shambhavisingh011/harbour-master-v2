---
# 1. INSTALLATION
- name: Install Node Exporter (All Nodes)
  apt:
    name: prometheus-node-exporter
    state: present
    update_cache: yes
  become: yes

- name: Install MySQL Exporter (DB Nodes Only)
  apt:
    name: 
      - prometheus-mysqld-exporter
      - python3-pymysql
    state: present
  become: yes
  when: inventory_hostname in (groups['galera'] + groups['async'] | default([]))

- name: "Create MariaDB Exporter User"
  community.mysql.mysql_user:
    name: "exporter"
    password: "{{ exporter_password }}"
    priv: "*.*:PROCESS,REPLICATION CLIENT,SELECT"
    state: present
    login_user: root
    login_password: "{{ db_admin_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    check_implicit_admin: yes
  become: yes
  # This is the "Magic": The task will keep trying until MariaDB accepts the connection.
  register: exporter_user_result
  until: exporter_user_result is not failed
  retries: 10
  delay: 5
  # This targets all database nodes (Galera + Async)
  when: inventory_hostname in (groups['galera'] + groups['async'] | default([]))
# 4. CONFIGURATION (IDEMPOTENT)
- name: Configure MySQL Exporter Auth
  copy:
    dest: /etc/mysql/exporter.cnf
    owner: prometheus
    group: prometheus
    mode: '0400'
    content: |
      [client]
      user=exporter
      password={{ exporter_password }}
      host=127.0.0.1  
  become: yes
  register: exporter_cfg
  when: inventory_hostname in (groups['galera'] + groups['async'] | default([]))
  notify: restart mysql exporter

- name: Set MySQL Exporter Flags
  lineinfile:
    path: /etc/default/prometheus-mysqld-exporter
    regexp: '^ARGS='
    line: 'ARGS="--config.my-cnf=/etc/mysql/exporter.cnf --web.listen-address=:9104"'
  become: yes
  register: exporter_flags
  when: inventory_hostname in (groups['galera'] + groups['async'] | default([]))
  notify: restart mysql exporter  

- name: Update Node Exporter ARGS for IP Visibility
  lineinfile:
    path: /etc/default/prometheus-node-exporter
    regexp: '^ARGS='
    line: 'ARGS="--collector.netdev.address-info --collector.network_route"'
  become: yes
  notify: restart node exporter

# 5. SERVICE MANAGEMENT
- name: Force Systemd to recognize flag changes
  systemd:
    daemon_reload: yes
  become: yes

- name: Start Node Exporter
  systemd:
    name: prometheus-node-exporter
    state: started
    enabled: yes
  become: yes

- name: Start MySQL Exporter (DB Nodes Only)
  systemd:
    name: prometheus-mysqld-exporter
    state: started
    enabled: yes
  become: yes
  
  register: mysqld_exporter_start
  ignore_errors: yes 
  when: inventory_hostname in (groups['galera'] + groups['async'] | default([]))
