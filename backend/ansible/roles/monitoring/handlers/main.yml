---
- name: restart prometheus
  systemd:
    name: prometheus
    state: restarted
    daemon_reload: yes
  become: yes

- name: restart grafana
  systemd:
    name: grafana-server
    state: restarted
    daemon_reload: yes
  become: yes

- name: restart mysql exporter
  systemd:
    name: prometheus-mysqld-exporter
    state: restarted
    daemon_reload: yes
  become: yes

- name: restart node exporter
  systemd:
    name: prometheus-node-exporter
    state: restarted
    daemon_reload: yes
  become: yes
